<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoría - Inventario</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                <h1 id="cat-titulo">📦 Cargando...</h1>
                <div id="user-info"></div>
            </div>
            <nav class="main-nav" id="main-nav">
                <!-- Se carga dinámicamente -->
            </nav>
        </header>

        <main>
            <div class="section-header">
                <div>
                    <h2>Items en Stock</h2>
                    <p id="cat-descripcion" style="color: var(--text-light); margin-top: 4px;">Cargando descripción...</p>
                </div>
                <button id="btn-agregar-item" class="btn-add">+ Agregar Nuevo Item</button>
            </div>

            <div class="inventory-grid" id="items-grid">
                <!-- Items se cargan dinámicamente -->
            </div>
        </main>
    </div>

    <!-- Modal para agregar/editar items -->
    <div id="modal-item" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <h3 id="modal-title">Agregar Item</h3>
            <form id="form-item" onsubmit="guardarItem(event)" autocomplete="off">
                <input type="hidden" id="item-id">
                <div class="form-group">
                    <label>Nombre del Item:</label>
                    <input type="text" id="item-nombre" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Cantidad en Stock:</label>
                    <input type="number" id="item-cantidad" min="0" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Unidad de Medida:</label>
                    <select id="item-unidad" autocomplete="off">
                        <option value="unidades">Unidades</option>
                        <option value="kg">Kilogramos</option>
                        <option value="litros">Litros</option>
                        <option value="paquetes">Paquetes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Stock Mínimo (alerta):</label>
                    <input type="number" id="item-minimo" min="0" value="10" autocomplete="off">
                </div>
                <button type="submit" class="btn-primary">Guardar Item</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!verificarSesion()) return;
            inicializarDatos();
            cargarCategoriaDinamica();
        });
    </script>
</body>
</html>

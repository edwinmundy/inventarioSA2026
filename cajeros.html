<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestión de Cajeros</title>

<link rel="stylesheet" href="css/estilos.css">

<style>

.admin-badge{
background:#667eea;
color:white;
padding:4px 12px;
border-radius:20px;
font-size:0.75rem;
font-weight:bold;
text-transform:uppercase;
}

.cajero-admin{
border-left:4px solid #667eea;
background:linear-gradient(to right,#eef2ff,white);
position:relative;
}

.cajero-admin::after{
content:'🔒 NO EDITABLE';
position:absolute;
top:8px;
right:8px;
font-size:0.7rem;
color:#667eea;
font-weight:bold;
}

</style>
</head>


<body>

<div class="container">

<header>

<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;">
<h1>👤 Gestión de Cajeros</h1>
<div id="user-info"></div>
</div>

<nav class="main-nav" id="main-nav">
</nav>

</header>


<main>

<div class="two-column-layout">

<!-- FORMULARIO -->
<div class="form-section">

<div class="card">

<h2 id="form-cajero-titulo">Nuevo Cajero</h2>

<form
id="form-cajero"
onsubmit="guardarCajero(event)"
autocomplete="off"
autocorrect="off"
autocapitalize="off"
spellcheck="false"
>

<!-- Campos falsos para bloquear autocompletar -->
<input type="text" style="display:none">
<input type="password" style="display:none">

<input type="hidden" id="cajero-id">

<div class="form-group">

<label>Nombre Completo:</label>

<input
type="text"
id="cajero-nombre"
required
placeholder="Ej: Juan Pérez"
autocomplete="off"
readonly
onfocus="this.removeAttribute('readonly');"
>

</div>


<div class="form-group">

<label>RUT:</label>

<input
type="text"
id="cajero-rut"
required
placeholder="12.345.678-9"
pattern="[0-9]{1,2}\.[0-9]{3}\.[0-9]{3}-[0-9kK]{1}"
autocomplete="off"
readonly
onfocus="this.removeAttribute('readonly');"
>

</div>


<div class="form-group">

<label>Turno:</label>

<select
id="cajero-turno"
required
autocomplete="off"
>

<option value="T1">T1</option>
<option value="T2">T2</option>
<option value="T3">T3</option>
<option value="ADMIN">ADMIN</option>

</select>

</div>


<div class="form-group">

<label>Código de Cajero:</label>

<input
type="text"
id="cajero-codigo"
required
placeholder="Utilice su mismo código de caja"
autocomplete="off"
readonly
onfocus="this.removeAttribute('readonly');"
>

</div>


<div class="form-group">

<label>Contraseña:</label>

<input
type="password"
id="cajero-password"
placeholder="Ingrese su clave de caja"
autocomplete="new-password"
readonly
onfocus="this.removeAttribute('readonly');"
>

</div>


<div class="form-group">

<label>Cargo:</label>

<select
id="cajero-cargo"
required
autocomplete="off"
>

<option value="Cajero Multifuncional">Cajero Multifuncional</option>
<option value="Cajero de Operaciones">Cajero de Operaciones</option>
<option value="Cajero de Procesos">Cajero de Procesos</option>
<option value="Encargado">Encargado</option>
<option value="Corporativo">Corporativo</option>

</select>

</div>


<div class="form-actions">

<button type="submit" class="btn-primary">
💾 Guardar Cajero
</button>

<button
type="button"
onclick="limpiarFormularioCajero()"
class="btn-secondary"
>
Limpiar
</button>

</div>

</form>

</div>

</div>


<!-- LISTA -->
<div class="list-section">

<div class="card">

<div class="list-header">

<h2>Lista de Cajeros</h2>
<span class="badge" id="contador-cajeros">0 activos</span>

</div>


<div class="search-box">

<input
type="text"
id="buscar-cajero"
placeholder="🔍 Buscar por nombre, código o cargo..."
onkeyup="filtrarCajeros()"
autocomplete="off"
readonly
onfocus="this.removeAttribute('readonly');"
>

</div>


<div
id="debug-info"
style="font-size:0.8rem;color:#64748b;margin-bottom:10px;padding:8px;background:#f1f5f9;border-radius:4px;display:none;"
>
</div>


<div class="cajeros-list" id="lista-cajeros">
</div>

</div>

</div>

</div>

</main>

</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="js/app.js"></script>

<!-- REEMPLAZAR el script al final de cajeros.html con: -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Inicializar datos PRIMERO (sin verificar sesión)
        if (!localStorage.getItem('inventario_cajeros')) {
            inicializarDatos();
        } else {
            // Solo actualizar navegación si ya existen datos
            actualizarNavegacion();
        }
        
        // 2. Verificar sesión DESPUÉS
        if (!verificarSesion()) return;
        
        // 3. Cargar datos de la página
        cargarCajeros();
        
        // 4. Mostrar usuario activo
        mostrarUsuarioActual();
    });
</script>


</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario General</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                <h1>📊 Inventario General</h1>
                <div id="user-info"></div>
            </div>
            <nav class="main-nav" id="main-nav">
                <!-- Se carga dinámicamente desde app.js -->
            </nav>
        </header>

        <main>
            <div class="inventory-tabs">
                <button class="tab-btn active" onclick="mostrarTab('todo')">Todo</button>
                <button class="tab-btn" onclick="mostrarTab('sa')">SA</button>
                <button class="tab-btn" onclick="mostrarTab('panaderia')">Panadería</button>
                <button class="tab-btn alert-tab" onclick="mostrarTab('alertas')">⚠️ Alertas de Stock</button>
            </div>

            <div class="table-container">
                <table class="inventory-table">
                    <thead>
                        <tr>
                            <th>Categoría</th>
                            <th>Item</th>
                            <th>Cantidad</th>
                            <th>Unidad</th>
                            <th>Stock Mínimo</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-inventario">
                        <!-- Datos se cargan dinámicamente -->
                    </tbody>
                </table>
            </div>

            <div class="export-section" style="margin-top: 20px;">
                <button onclick="exportarExcel()" class="btn-export">📥 Exportar a Excel</button>
                <button onclick="generarReporte()" class="btn-export">📄 Generar Reporte PDF</button>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!verificarSesion()) return;
            inicializarDatos();
            cargarInventarioGeneral('todo');
        });
    </script>
</body>
</html>

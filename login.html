<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Inventario</title>
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .login-logo p {
            color: #64748b;
        }
        .login-form .form-group {
            margin-bottom: 20px;
        }
        .login-form input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .login-form input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .login-error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .login-info {
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <h1>🍞</h1>
                <h2>Sistema de Inventario</h2>
                <p>Inicie sesión para continuar</p>
            </div>
            
            <div id="login-error" class="login-error">
                ❌ Código o contraseña incorrectos
            </div>
            
            <form class="login-form" onsubmit="iniciarSesion(event)" autocomplete="off">
                <div class="form-group">
                    <input type="text" id="login-codigo" placeholder="Código de cajero" 
                           required autofocus autocomplete="off">
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" placeholder="Contraseña" required autocomplete="off">
                </div>
                <button type="submit" class="login-btn">🔐 Iniciar Sesión</button>
            </form>
            
            <div class="login-info">
                <p>💡 Usuario por defecto:</p>
                <p>ADMIN</p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <!-- REEMPLAZAR el script al final de login.html con: -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Solo inicializar datos si es primera vez
        if (!localStorage.getItem('inventario_cajeros')) {
            inicializarDatos();
        }
        
        // Si ya hay sesión activa, redirigir a index
        const sesion = localStorage.getItem('inventario_sesion');
        if (sesion) {
            const datos = JSON.parse(sesion);
            const ahora = new Date().getTime();
            const expiracion = 8 * 60 * 60 * 1000;
            
            if (ahora - datos.inicio < expiracion) {
                window.location.href = 'index.html';
            } else {
                localStorage.removeItem('inventario_sesion');
            }
        }
    });
</script>
</body>
</html>
